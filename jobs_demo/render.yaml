services:
  - type: web
    name: jobgateway-api
    runtime: node
    rootDir: jobs_demo/backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    buildFilter:
      paths:
        - jobs_demo/backend/**
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MONGO_URI
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_JWT_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        sync: false
      - key: JAMENDO_CLIENT_ID
        value: 96cd8d1e
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: MUSIC_DEFAULT_INDIAN_HITS_QUERY
        value: indian hit songs bollywood tamil telugu malayalam punjabi

  - type: web
    name: jobgateway-web
    runtime: static
    rootDir: jobs_demo/frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    buildFilter:
      paths:
        - jobs_demo/frontend/**
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_RAZORPAY_KEY_ID
        sync: false
      - key: VITE_ALLOW_DEMO_AUTH
        value: 0
