<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="wall" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#54585e"/>
      <stop offset="40%" stop-color="#90959a"/>
      <stop offset="100%" stop-color="#dbdcda"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#7f8286"/>
      <stop offset="100%" stop-color="#cbcdca"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <rect width="1600" height="720" fill="url(#wall)"/>
  <rect y="720" width="1600" height="180" fill="url(#floor)"/>

  <rect x="0" y="0" width="195" height="720" fill="#f3f5f4"/>
  <rect x="34" y="0" width="10" height="720" fill="#c2c6ca"/>
  <rect x="110" y="0" width="8" height="720" fill="#c2c6ca"/>
  <rect x="0" y="110" width="195" height="10" fill="#c2c6ca"/>
  <rect x="0" y="285" width="195" height="10" fill="#c2c6ca"/>

  <g opacity="0.84" filter="url(#soft)">
    <polygon points="210,165 990,150 1520,210 1510,760 840,812 235,742" fill="#ffffff" fill-opacity="0.78"/>
    <polygon points="206,165 425,160 1110,836 900,836" fill="#d7d7d5" fill-opacity="0.68"/>
  </g>

  <g opacity="0.25" filter="url(#soft)">
    <ellipse cx="920" cy="780" rx="430" ry="50" fill="#a4a5a6"/>
  </g>
</svg>
