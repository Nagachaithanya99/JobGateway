<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="leftWall" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ead6b9"/>
      <stop offset="100%" stop-color="#f1e2cc"/>
    </linearGradient>
    <linearGradient id="rightWall" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#f2e0c8"/>
      <stop offset="100%" stop-color="#e8d0af"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#9f8a77"/>
      <stop offset="100%" stop-color="#75614f"/>
    </linearGradient>
    <linearGradient id="doorGlass" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#9bd5dd" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#5f8f9d" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="blurDoor" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <rect width="1600" height="110" fill="#d7cec2"/>
  <polygon points="0,110 700,110 640,740 0,740" fill="url(#leftWall)"/>
  <polygon points="700,110 1600,110 1600,740 810,740" fill="url(#rightWall)"/>
  <polygon points="0,740 1600,740 1600,900 0,900" fill="url(#floor)"/>

  <rect x="682" y="160" width="150" height="470" rx="8" fill="#d5c3aa"/>
  <rect x="697" y="178" width="116" height="430" rx="4" fill="url(#doorGlass)"/>
  <rect x="798" y="394" width="8" height="58" rx="4" fill="#d4d6d8"/>
  <rect x="690" y="618" width="150" height="18" fill="#baa489"/>

  <g fill="#f3f3f1">
    <ellipse cx="755" cy="46" rx="42" ry="58"/>
    <ellipse cx="828" cy="28" rx="34" ry="48"/>
    <ellipse cx="885" cy="56" rx="40" ry="56"/>
  </g>

  <g opacity="0.18" filter="url(#blurDoor)">
    <polygon points="620,180 775,170 820,470 670,510" fill="#ffffff"/>
  </g>

  <g fill="#ececec">
    <rect x="1230" y="640" width="200" height="22" rx="4"/>
    <circle cx="1260" cy="651" r="11" fill="#f8f8f8"/>
    <circle cx="1300" cy="651" r="11" fill="#f8f8f8"/>
    <circle cx="1340" cy="651" r="11" fill="#f8f8f8"/>
    <circle cx="1380" cy="651" r="11" fill="#f8f8f8"/>
  </g>
</svg>
