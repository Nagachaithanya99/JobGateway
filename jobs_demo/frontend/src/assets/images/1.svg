<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eff6ff"></stop>
      <stop offset="0.55" stop-color="#ffffff"></stop>
      <stop offset="1" stop-color="#fff7ed"></stop>
    </linearGradient>

    <linearGradient id="blue" x1="0" x2="1">
      <stop offset="0" stop-color="#2563eb"></stop>
      <stop offset="1" stop-color="#60a5fa"></stop>
    </linearGradient>

    <linearGradient id="orange" x1="0" x2="1">
      <stop offset="0" stop-color="#f97316"></stop>
      <stop offset="1" stop-color="#fb923c"></stop>
    </linearGradient>

    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"></feGaussianBlur>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" rx="40" fill="url(#bg)"></rect>
  <circle cx="140" cy="110" r="110" fill="#93c5fd" opacity="0.25" filter="url(#soft)"></circle>
  <circle cx="1020" cy="140" r="140" fill="#fdba74" opacity="0.22" filter="url(#soft)"></circle>
  <circle cx="760" cy="640" r="150" fill="#a5b4fc" opacity="0.18" filter="url(#soft)"></circle>

  <!-- Card -->
  <rect x="80" y="120" width="520" height="460" rx="26" fill="#ffffff" stroke="#e2e8f0"></rect>
  <rect x="110" y="160" width="220" height="22" rx="11" fill="#ffedd5"></rect>
  <rect x="110" y="210" width="430" height="18" rx="9" fill="#0f172a" opacity="0.12"></rect>
  <rect x="110" y="240" width="360" height="18" rx="9" fill="#0f172a" opacity="0.10"></rect>
  <rect x="110" y="270" width="320" height="18" rx="9" fill="#0f172a" opacity="0.08"></rect>

  <!-- Search bar -->
  <rect x="110" y="330" width="460" height="62" rx="18" fill="#f8fafc" stroke="#e2e8f0"></rect>
  <circle cx="140" cy="361" r="10" fill="#94a3b8"></circle>
  <rect x="165" y="350" width="240" height="18" rx="9" fill="#0f172a" opacity="0.12"></rect>
  <rect x="430" y="342" width="130" height="40" rx="14" fill="url(#blue)"></rect>

  <!-- Chips -->
  <rect x="110" y="410" width="105" height="30" rx="15" fill="#ffffff" stroke="#e2e8f0"></rect>
  <rect x="225" y="410" width="120" height="30" rx="15" fill="#ffffff" stroke="#e2e8f0"></rect>
  <rect x="355" y="410" width="110" height="30" rx="15" fill="#ffffff" stroke="#e2e8f0"></rect>
  <rect x="475" y="410" width="90" height="30" rx="15" fill="#ffffff" stroke="#e2e8f0"></rect>

  <!-- Right illustration scene -->
  <rect x="650" y="150" width="470" height="430" rx="32" fill="#ffffff" stroke="#e2e8f0"></rect>
  <rect x="690" y="190" width="180" height="220" rx="18" fill="#f8fafc" stroke="#e2e8f0"></rect>
  <rect x="900" y="190" width="180" height="140" rx="18" fill="#f8fafc" stroke="#e2e8f0"></rect>
  <rect x="900" y="350" width="180" height="60" rx="18" fill="#f8fafc" stroke="#e2e8f0"></rect>

  <!-- People (simple modern) -->
  <circle cx="770" cy="470" r="36" fill="#fde68a"></circle>
  <rect x="735" y="510" width="70" height="70" rx="18" fill="url(#orange)"></rect>
  <circle cx="1010" cy="470" r="36" fill="#bfdbfe"></circle>
  <rect x="975" y="510" width="70" height="70" rx="18" fill="url(#blue)"></rect>

  <!-- Handshake lines -->
  <path d="M820 520 C860 500, 900 500, 940 520" stroke="#94a3b8" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.65"></path>

  <!-- Accent dots -->
  <circle cx="640" cy="120" r="6" fill="#2563eb" opacity="0.35"></circle>
  <circle cx="1090" cy="610" r="6" fill="#f97316" opacity="0.35"></circle>
  <circle cx="610" cy="600" r="5" fill="#6366f1" opacity="0.25"></circle>
</svg>